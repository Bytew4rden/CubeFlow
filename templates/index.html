<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../static/style.css" />
    <title>Document</title>
  </head>
  <body>
    <div id="app">
      <h1>CubeFlow</h1>
      <div id="scramble_div">
        <h2 id="scramble"></h2>
        <button onclick="generateScramble()">New Scramble</button>
      </div>

      <div id="timer_div">
        <h2 id="timer">0.00</h2>
        <button id="timer_btn" onclick="toggleTimer()">Start Timer</button>
      </div>

      <div id="stats">
        <table id="aggr_tbl">
          <tbody>
            <tr>
              <th scope="row">Last Solve</th>
              <td id="last"></td>
            </tr>
            <tr>
              <th scope="row">Best Solve</th>
              <td id="best"></td>
            </tr>
            <tr>
              <th scope="row">Avg 3</th>
              <td id="avg3"></td>
            </tr>
            <tr>
              <th scope="row">Avg 5</th>
              <td id="avg5"></td>
            </tr>
            <tr>
              <th scope="row">Avg 12</th>
              <td id="avg12"></td>
            </tr>
            <tr>
              <th scope="row">Lifetime Avg</th>
              <td id="avgAll"></td>
            </tr>
          </tbody>
        </table>

        <table id="solves_tbl">
          <thead>
            <tr>
              <th>#</th>
              <th>Scramble</th>
              <th>Time</th>
            </tr>
          </thead>
          <tbody id="solves_tbl_body">
            <!-- This section is auto-filled in the 
             index.js - UpdateUI() function. -->
          </tbody>
        </table>
      </div>
    </div>

    <script src="../static/index.js"></script>
  </body>
</html>
